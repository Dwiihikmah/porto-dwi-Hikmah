<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Portfolio profesional Dwi Hikmah Ramadhani - Pranata Komputer & Profesional IT" />
    <title>Dwi Hikmah Ramadhani - Portfolio</title>
  </head>
  <body>
    <!-- Modern Preloader -->
    <div id="preloader" style="
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-color: #ffffff;
      z-index: 999999;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.6s;
    ">
      <div style="position: relative; display: flex; align-items: center; justify-center: center; width: 80px; height: 80px;">
        <!-- Spinner Ring -->
        <div style="
          position: absolute;
          width: 100%;
          height: 100%;
          border: 4px solid rgba(37, 99, 235, 0.1);
          border-top: 4px solid #2563eb;
          border-radius: 50%;
          animation: spinPreloader 1s linear infinite;
        "></div>
        <!-- Inisial D -->
        <div style="
          display: flex;
          align-items: center;
          justify-content: center;
          width: 80px;
          height: 80px;
          font-family: sans-serif;
          font-size: 28px;
          font-weight: 800;
          color: #2563eb;
          animation: pulsePreloader 1.5s ease-in-out infinite;
        ">D</div>
      </div>
    </div>

    <style>
      @keyframes spinPreloader {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      @keyframes pulsePreloader {
        0%, 100% { transform: scale(0.9); opacity: 0.7; }
        50% { transform: scale(1.1); opacity: 1; }
      }
      [data-theme="dark"] #preloader {
        background-color: #0a0e27 !important;
      }
    </style>

    <script>
      window.addEventListener('load', function() {
        var preloader = document.getElementById('preloader');
        if (preloader) {
          preloader.style.opacity = '0';
          setTimeout(function() {
            preloader.style.display = 'none';
          }, 600);
        }
      });
    </script>

    <noscript>Anda memerlukan JavaScript untuk menjalankan aplikasi ini.</noscript>
    <div id="root"></div>
  </body>
</html>
